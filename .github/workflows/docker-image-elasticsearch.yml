name: Docker Image ElasticSearch  CI
on:
  workflow_dispatch: #github页面手动触发
  push:
    tags:
      - "v*.*" # github 发布tag时触发自动构建
# on:
#   push:
#     branches: [ "master" ]
#   pull_request:
#     branches: [ "master" ]

env:
  IMAGE_ROOT: software
  IMAGE: elasticsearch # 镜像
  IMAGE_NAME: blankhang/elasticsearch #这是您的镜像名
  IMAGE_VERSION: "9.4.2" # 当前发布版本

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build by platform and push by digest
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./${{ env.IMAGE_ROOT }}/${{ env.IMAGE }}/${{ env.IMAGE_VERSION }}/build/
          file: ./${{ env.IMAGE_ROOT }}/${{ env.IMAGE }}/${{ env.IMAGE_VERSION }}/build/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ env.IMAGE_VERSION }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ env.IMAGE_VERSION }}-${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.docker_build.outputs.digest }}"
          digest="${digest#sha256:}"
          touch "/tmp/digests/${digest}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to AliDockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
          username: ${{ secrets.ALI_DOCKER_HUB_USN }}
          password: ${{ secrets.ALI_DOCKER_HUB_PWD }}

      - name: Merge and push DockerHub multi-arch manifest
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find /tmp/digests -type f)
          if [ "${#files[@]}" -lt 2 ]; then
            echo "::error::Expected at least 2 platform digests, got ${#files[@]}"
            find /tmp/digests -ls || true
            exit 1
          fi
          refs=()
          for f in "${files[@]}"; do
            refs+=("${IMAGE}@sha256:$(basename "$f")")
          done
          docker buildx imagetools create \
            -t "${IMAGE}:${{ env.IMAGE_VERSION }}" \
            -t "${IMAGE}:latest" \
            "${refs[@]}"

      - name: Merge and push AliDockerHub multi-arch manifest
        run: |
          set -euo pipefail
          docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }} \
            ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:${{ env.IMAGE_VERSION }}
          docker push ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:${{ env.IMAGE_VERSION }}

          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }} \
            ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:latest
          docker push ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:latest

      - name: Sync image to Ali servers
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALI_SERVER_PRIVATE_KEY }}
          SERVER_HOSTNAMES: ${{ secrets.ALI_SERVER_HOSTNAMES }}
          ALI_REGISTRY: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
          ALI_USN: ${{ secrets.ALI_DOCKER_HUB_USN }}
          ALI_PWD: ${{ secrets.ALI_DOCKER_HUB_PWD }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          sync_image_on_server() {
            local host="$1"
            local ali_image="$2"
            local local_image="$3"
            host="$(echo "$host" | xargs)"

            echo "==> Syncing ${local_image} on ${host}..."
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 9117 "root@${host}" \
              env \
                ALI_REGISTRY="$ALI_REGISTRY" \
                ALI_USN="$ALI_USN" \
                ALI_PWD="$ALI_PWD" \
                ALI_IMAGE="$ali_image" \
                LOCAL_IMAGE="$local_image" \
              bash -s <<'REMOTE_EOF'
          set -euo pipefail
          echo "$ALI_PWD" | docker login "$ALI_REGISTRY" -u "$ALI_USN" --password-stdin
          docker pull "$ALI_IMAGE"
          docker tag "$ALI_IMAGE" "$LOCAL_IMAGE"
          docker rmi "$ALI_IMAGE" || true
          REMOTE_EOF
          }

          ALI_IMAGE="${ALI_REGISTRY}/blankhang/${{ env.IMAGE }}:${{ env.IMAGE_VERSION }}"
          LOCAL_IMAGE="${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}"
          ALI_LATEST="${ALI_REGISTRY}/blankhang/${{ env.IMAGE }}:latest"
          LOCAL_LATEST="${{ env.IMAGE_NAME }}:latest"

          IFS=',' read -ra HOSTS <<< "$SERVER_HOSTNAMES"
          for host in "${HOSTS[@]}"; do
            [ -n "$host" ] || continue
            sync_image_on_server "$host" "$ALI_IMAGE" "$LOCAL_IMAGE"
            sync_image_on_server "$host" "$ALI_LATEST" "$LOCAL_LATEST"
          done
