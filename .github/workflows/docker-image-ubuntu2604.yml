name: Docker Image Ubuntu2604  CI
on:
  workflow_dispatch: #github页面手动触发
  push:
    tags:
      - "v*.*" # github 发布tag时触发自动构建
# on:
#   push:
#     branches: [ "master" ]
#   pull_request:
#     branches: [ "master" ]

env:
  IMAGE_ROOT: operation-system
  IMAGE: ubuntu2604
  IMAGE_NAME: blankhang/ubuntu2604 #这是您的镜像名
  
jobs:

  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4

    - name: Docker Login
      #if: github.event_name !='pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v7
      with:
        builder: ${{ steps.buildx.outputs.name }}
        context: ./${{ env.IMAGE_ROOT }}/${{ env.IMAGE }}
        file: ./${{ env.IMAGE_ROOT }}/${{ env.IMAGE }}/Dockerfile
        platforms: linux/amd64,linux/arm64
        #,linux/ppc64le,linux/s390x
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: true
        tags: ${{ env.IMAGE_NAME }}:latest

    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}

    - name: Login to AliDockerHub
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
        username: ${{ secrets.ALI_DOCKER_HUB_USN }}
        password: ${{ secrets.ALI_DOCKER_HUB_PWD }}

    - name: ReTag and push to AliDockerHub
      run: |
        docker pull ${{ env.IMAGE_NAME }}:latest

        docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:latest
        docker push ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:latest
