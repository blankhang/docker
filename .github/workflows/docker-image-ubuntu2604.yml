name: Docker Image Ubuntu2604  CI
on:
  workflow_dispatch: #github页面手动触发
  push:
    tags:
      - "v*.*" # github 发布tag时触发自动构建
# on:
#   push:
#     branches: [ "master" ]
#   pull_request:
#     branches: [ "master" ]

env:
  IMAGE_ROOT: operation-system
  IMAGE: ubuntu2604
  IMAGE_NAME: blankhang/ubuntu2604 #这是您的镜像名
  
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    env:
      TZ: Asia/Shanghai
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4

    - name: Docker Login
      #if: github.event_name !='pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build by platform and push by digest
      id: docker_build
      uses: docker/build-push-action@v7
      with:
        builder: ${{ steps.buildx.outputs.name }}
        context: ./${{ env.IMAGE_ROOT }}/${{ env.IMAGE }}
        file: ./${{ env.IMAGE_ROOT }}/${{ env.IMAGE }}/Dockerfile
        platforms: ${{ matrix.platform }}
        cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.platform }}
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.platform }}
        outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
        tags: ${{ env.IMAGE_NAME }}:latest

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.docker_build.outputs.digest }}"
        digest="${digest#sha256:}"
        touch "/tmp/digests/${digest}"

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ replace(matrix.platform, '/', '-') }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    runs-on: ubuntu-22.04
    needs: build
    env:
      TZ: Asia/Shanghai
    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Docker Login
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Login to AliDockerHub
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
        username: ${{ secrets.ALI_DOCKER_HUB_USN }}
        password: ${{ secrets.ALI_DOCKER_HUB_PWD }}

    - name: Merge and push DockerHub multi-arch manifest
      run: |
        docker buildx imagetools create \
          -t ${{ env.IMAGE_NAME }}:latest \
          $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' /tmp/digests/*)

    - name: Merge and push AliDockerHub multi-arch manifest
      run: |
        docker buildx imagetools create \
          -t ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/${{ env.IMAGE }}:latest \
          $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' /tmp/digests/*)
