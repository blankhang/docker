name: Docker Image Nginx Ip2region CI

on:
  workflow_call:
    inputs:
      nginx_version:
        required: false
        type: string
      force_build:
        required: false
        default: false
        type: boolean
      set_latest:
        required: false
        default: false
        type: boolean
      ali_server_hostnames:
        required: false
        type: string
        default: wh-1.xhc-bot.com,wh-3.xhc-bot.com,sz-1.xhc-bot.com,sz-2.xhc-bot.com,sz-3.xhc-bot.com,sz-0.xhc-bot.com,sz-01.xhc-bot.com,us-1.xhc-bot.com,us-2.xhc-bot.com,us-3.xhc-bot.com,us-4.xhc-bot.com
      force_sync:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      nginx_version:
        description: "指定 nginx 版本，留空则自动检测最新 mainline 版"
        required: false
        type: string
      force_build:
        description: "即使镜像标签已存在也强制重新构建"
        required: false
        default: false
        type: boolean
      set_latest:
        description: "手动构建时，如果版本正好是最新 mainline 版则同步更新 latest"
        required: false
        default: false
        type: boolean
      ali_server_hostnames:
        description: "阿里云服务器主机名列表，逗号分隔"
        required: false
        type: string
        default: wh-1.xhc-bot.com,wh-3.xhc-bot.com,sz-1.xhc-bot.com,sz-2.xhc-bot.com,sz-3.xhc-bot.com,sz-0.xhc-bot.com,sz-01.xhc-bot.com,us-1.xhc-bot.com,us-2.xhc-bot.com,us-3.xhc-bot.com,us-4.xhc-bot.com
      force_sync:
        description: "镜像已存在时，仍从 Docker Hub 提取 amd64 模块并同步到服务器"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: read

concurrency:
  group: docker-image-nginx-ip2region
  cancel-in-progress: false

env:
  IMAGE_ROOT: software/nginx/ip2region
  IMAGE_NAME: blankhang/nginx-ip2region
  PLATFORMS: linux/amd64,linux/arm64
  IP2REGION_REPO: https://github.com/blankhang/ip2region.git
  IP2REGION_REF: fac3d0376a7c75307104ac4fc65b945020f6cca2
  RELEASE_REPOSITORY: blankhang/ip2region
  DEFAULT_ALI_SERVER_HOSTNAMES: wh-1.xhc-bot.com,wh-3.xhc-bot.com,sz-1.xhc-bot.com,sz-2.xhc-bot.com,sz-3.xhc-bot.com,sz-0.xhc-bot.com,sz-01.xhc-bot.com,us-1.xhc-bot.com,us-2.xhc-bot.com,us-3.xhc-bot.com,us-4.xhc-bot.com

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      target_version: ${{ steps.detect.outputs.target_version }}
      image_exists: ${{ steps.detect.outputs.image_exists }}
      release_exists: ${{ steps.detect.outputs.release_exists }}
      release_assets_complete: ${{ steps.detect.outputs.release_assets_complete }}
      should_build: ${{ steps.detect.outputs.should_build }}
      should_release: ${{ steps.detect.outputs.should_release }}
      release_source: ${{ steps.detect.outputs.release_source }}
      publish_mode: ${{ steps.detect.outputs.publish_mode }}
      set_latest: ${{ steps.detect.outputs.set_latest }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      release_name: ${{ steps.detect.outputs.release_name }}
      asset_basename: ${{ steps.detect.outputs.asset_basename }}
      artifact_name: ${{ steps.detect.outputs.artifact_name }}
    steps:
      - name: Detect target version
        id: detect
        env:
          INPUT_NGINX_VERSION: ${{ inputs.nginx_version || github.event.inputs.nginx_version || '' }}
          FORCE_BUILD: ${{ inputs.force_build || github.event.inputs.force_build || 'false' }}
          MANUAL_SET_LATEST: ${{ inputs.set_latest || github.event.inputs.set_latest || 'false' }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IP2REGION_REF: ${{ env.IP2REGION_REF }}
          RELEASE_REPOSITORY: ${{ env.RELEASE_REPOSITORY }}
          RELEASE_TOKEN: ${{ secrets.IP2REGION_RELEASE_TOKEN || '' }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          version_re = re.compile(r"^\d+\.\d+\.\d+$")

          def parse_version(version):
              return tuple(map(int, version.split(".")))

          def is_mainline_release(version):
              _, minor, _ = parse_version(version)
              return minor % 2 == 1

          def fetch_json(url):
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "github-actions-nginx-ip2region"},
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          def fetch_github_json(url, token=""):
              headers = {
                  "User-Agent": "github-actions-nginx-ip2region",
                  "Accept": "application/vnd.github+json",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          def head_ok(url):
              req = urllib.request.Request(
                  url,
                  method="HEAD",
                  headers={"User-Agent": "github-actions-nginx-ip2region"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return 200 <= resp.status < 400
              except Exception:
                  return False

          def tag_exists(image_name, tag):
              namespace, repo = image_name.split("/", 1)
              url = (
                  f"https://hub.docker.com/v2/namespaces/{namespace}/"
                  f"repositories/{repo}/tags/{tag}"
              )
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "github-actions-nginx-ip2region"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=30):
                      return True
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return False
                  raise

          def release_state(repository, tag, asset_names, token=""):
              url = f"https://api.github.com/repos/{repository}/releases/tags/{tag}"
              try:
                  payload = fetch_github_json(url, token=token)
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return False, False
                  raise
              assets = {asset.get("name", "") for asset in payload.get("assets", [])}
              return True, all(name in assets for name in asset_names)

          def latest_mainline_nginx():
              url = "https://hub.docker.com/v2/namespaces/library/repositories/nginx/tags?page_size=100"
              versions = set()
              while url:
                  payload = fetch_json(url)
                  for item in payload.get("results", []):
                      name = item.get("name", "")
                      if version_re.fullmatch(name) and is_mainline_release(name):
                          versions.add(name)
                  url = payload.get("next")
              if not versions:
                  raise RuntimeError("未获取到 nginx mainline 版标签")
              return max(versions, key=parse_version)

          requested_version = os.environ.get("INPUT_NGINX_VERSION", "").strip()
          force_build = os.environ.get("FORCE_BUILD", "false").lower() == "true"
          manual_set_latest = os.environ.get("MANUAL_SET_LATEST", "false").lower() == "true"
          image_name = os.environ["IMAGE_NAME"]
          ip2region_ref = os.environ["IP2REGION_REF"]
          release_repository = os.environ["RELEASE_REPOSITORY"]
          release_token = os.environ.get("RELEASE_TOKEN", "")

          latest_version = latest_mainline_nginx()
          target_version = requested_version or latest_version

          if not version_re.fullmatch(target_version):
              raise RuntimeError(
                  f"只支持 x.y.z 版本号，当前输入为: {target_version or '<empty>'}"
              )

          if not tag_exists("library/nginx", target_version):
              raise RuntimeError(f"Docker Hub 上不存在 nginx:{target_version}")

          source_url = f"https://nginx.org/download/nginx-{target_version}.tar.gz"
          if not head_ok(source_url):
              raise RuntimeError(f"nginx 源码包不可用: {source_url}")

          short_ref = ip2region_ref[:7]
          release_tag = f"nginx-ip2region-nginx-{target_version}-{short_ref}"
          release_name = target_version
          asset_basename = f"nginx-ip2region-nginx-{target_version}-linux"
          artifact_name = f"nginx-ip2region-module-{target_version}"
          image_exists = tag_exists(image_name, target_version)
          release_exists, release_assets_complete = release_state(
              release_repository,
              release_tag,
              [
                  f"{asset_basename}-amd64.so",
                  f"{asset_basename}-amd64.so.sha256",
                  f"{asset_basename}-arm64.so",
                  f"{asset_basename}-arm64.so.sha256",
              ],
              token=release_token,
          )

          if force_build or not image_exists:
              should_build = True
              should_release = True
              release_source = "build"
              publish_mode = "build_and_release"
          elif not release_assets_complete:
              should_build = False
              should_release = True
              release_source = "image"
              publish_mode = "release_only"
          else:
              should_build = False
              should_release = False
              release_source = "skip"
              publish_mode = "skip"

          set_latest = (target_version == latest_version) and (
              requested_version == "" or manual_set_latest
          )

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"target_version={target_version}\n")
              fh.write(f"image_exists={'true' if image_exists else 'false'}\n")
              fh.write(f"release_exists={'true' if release_exists else 'false'}\n")
              fh.write(
                  f"release_assets_complete={'true' if release_assets_complete else 'false'}\n"
              )
              fh.write(f"should_build={'true' if should_build else 'false'}\n")
              fh.write(f"should_release={'true' if should_release else 'false'}\n")
              fh.write(f"release_source={release_source}\n")
              fh.write(f"publish_mode={publish_mode}\n")
              fh.write(f"set_latest={'true' if set_latest else 'false'}\n")
              fh.write(f"release_tag={release_tag}\n")
              fh.write(f"release_name={release_name}\n")
              fh.write(f"asset_basename={asset_basename}\n")
              fh.write(f"artifact_name={artifact_name}\n")
          PY

      - name: Show decision
        run: |
          echo "target_version=${{ steps.detect.outputs.target_version }}"
          echo "image_exists=${{ steps.detect.outputs.image_exists }}"
          echo "release_exists=${{ steps.detect.outputs.release_exists }}"
          echo "release_assets_complete=${{ steps.detect.outputs.release_assets_complete }}"
          echo "should_build=${{ steps.detect.outputs.should_build }}"
          echo "should_release=${{ steps.detect.outputs.should_release }}"
          echo "release_source=${{ steps.detect.outputs.release_source }}"
          echo "publish_mode=${{ steps.detect.outputs.publish_mode }}"
          echo "set_latest=${{ steps.detect.outputs.set_latest }}"

  build-image:
    runs-on: ubuntu-latest
    needs: detect-version
    if: needs.detect-version.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      TARGET_VERSION: ${{ needs.detect-version.outputs.target_version }}
      SET_LATEST: ${{ needs.detect-version.outputs.set_latest }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Show pinned ip2region source
        run: |
          echo "IP2REGION_REPO=${IP2REGION_REPO}"
          echo "IP2REGION_REF=${IP2REGION_REF}"

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all
          cache-image: false

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build module artifact
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./${{ env.IMAGE_ROOT }}
          file: ./${{ env.IMAGE_ROOT }}/Dockerfile
          build-args: |
            NGINX_VERSION=${{ env.TARGET_VERSION }}
            IP2REGION_REPO=${{ env.IP2REGION_REPO }}
            IP2REGION_REF=${{ env.IP2REGION_REF }}
          target: export
          platforms: linux/amd64
          outputs: type=local,dest=./dist
          cache-from: type=gha,scope=nginx-ip2region-export-${{ env.TARGET_VERSION }}
          cache-to: type=gha,mode=max,scope=nginx-ip2region-export-${{ env.TARGET_VERSION }}

      - name: Upload module artifact
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7
        with:
          name: nginx-ip2region-module-${{ env.TARGET_VERSION }}
          path: ./dist/ngx_http_ip2region_module.so
          if-no-files-found: error

      - name: Build image by platform and push by digest
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./${{ env.IMAGE_ROOT }}
          file: ./${{ env.IMAGE_ROOT }}/Dockerfile
          build-args: |
            NGINX_VERSION=${{ env.TARGET_VERSION }}
            IP2REGION_REPO=${{ env.IP2REGION_REPO }}
            IP2REGION_REF=${{ env.IP2REGION_REF }}
          target: final
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=nginx-ip2region-final-${{ env.TARGET_VERSION }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=nginx-ip2region-final-${{ env.TARGET_VERSION }}-${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.docker_build.outputs.digest }}"
          digest="${digest#sha256:}"
          touch "/tmp/digests/${digest}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    runs-on: ubuntu-latest
    needs:
      - detect-version
      - build-image
    if: needs.detect-version.outputs.should_build == 'true' && needs.build-image.result == 'success'
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      TARGET_VERSION: ${{ needs.detect-version.outputs.target_version }}
      SET_LATEST: ${{ needs.detect-version.outputs.set_latest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to AliDockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
          username: ${{ secrets.ALI_DOCKER_HUB_USN }}
          password: ${{ secrets.ALI_DOCKER_HUB_PWD }}

      - name: Merge and push DockerHub multi-arch manifest
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find /tmp/digests -type f)
          if [ "${#files[@]}" -lt 2 ]; then
            echo "::error::Expected at least 2 platform digests, got ${#files[@]}"
            find /tmp/digests -ls || true
            exit 1
          fi
          refs=()
          for f in "${files[@]}"; do
            refs+=("${IMAGE}@sha256:$(basename "$f")")
          done
          tag_args=(-t "${IMAGE}:${TARGET_VERSION}")
          if [ "${SET_LATEST}" = "true" ]; then
            tag_args+=(-t "${IMAGE}:latest")
          fi
          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Merge and push AliDockerHub multi-arch manifest
        run: |
          set -euo pipefail
          docker pull "${{ env.IMAGE_NAME }}:${TARGET_VERSION}"
          docker tag "${{ env.IMAGE_NAME }}:${TARGET_VERSION}" \
            "${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/nginx-ip2region:${TARGET_VERSION}"
          docker push "${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/nginx-ip2region:${TARGET_VERSION}"
          if [ "${SET_LATEST}" = "true" ]; then
            docker tag "${{ env.IMAGE_NAME }}:${TARGET_VERSION}" \
              "${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/nginx-ip2region:latest"
            docker push "${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/blankhang/nginx-ip2region:latest"
          fi

      - name: Smoke test module load
        run: |
          docker pull "${{ env.IMAGE_NAME }}:${TARGET_VERSION}"
          docker run --rm --entrypoint /bin/sh "${{ env.IMAGE_NAME }}:${TARGET_VERSION}" -ec '
            cat >/tmp/nginx.conf <<EOF
          load_module /etc/nginx/modules/ngx_http_ip2region_module.so;
          events {}
          http {
              server {
                  listen 8080;
              }
          }
          EOF
            nginx -t -c /tmp/nginx.conf
          '

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - detect-version
      - build-image
      - merge-image
    if: always() && needs.detect-version.outputs.should_release == 'true' && (needs.build-image.result == 'success' || needs.build-image.result == 'skipped') && (needs.merge-image.result == 'success' || needs.merge-image.result == 'skipped')
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      TARGET_VERSION: ${{ needs.detect-version.outputs.target_version }}
      SET_LATEST: ${{ needs.detect-version.outputs.set_latest }}
      RELEASE_TAG: ${{ needs.detect-version.outputs.release_tag }}
      RELEASE_NAME: ${{ needs.detect-version.outputs.release_name }}
      ASSET_BASENAME: ${{ needs.detect-version.outputs.asset_basename }}
      ARTIFACT_NAME: ${{ needs.detect-version.outputs.artifact_name }}
      RELEASE_SOURCE: ${{ needs.detect-version.outputs.release_source }}
    steps:
      - name: Validate cross-repo release token
        env:
          RELEASE_TOKEN: ${{ secrets.IP2REGION_RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "Missing required secret: IP2REGION_RELEASE_TOKEN"
            echo "This secret must have contents:write access to ${RELEASE_REPOSITORY}"
            exit 1
          fi

      - name: Set up QEMU for multi-arch extraction
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Login to Docker Hub for release publishing
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract module from multi-arch image
        run: |
          mkdir -p ./dist
          IMAGE_REF="${{ env.IMAGE_NAME }}:${TARGET_VERSION}"

          extract_module() {
            arch="$1"
            cid=""
            docker pull --platform "linux/${arch}" "${IMAGE_REF}"
            cid="$(docker create --platform "linux/${arch}" "${IMAGE_REF}")"
            docker cp "${cid}:/etc/nginx/modules/ngx_http_ip2region_module.so" "./dist/${ASSET_BASENAME}-${arch}.so"
            docker rm -f "${cid}" >/dev/null 2>&1 || true
          }

          extract_module amd64
          extract_module arm64

      - name: Prepare GitHub Release assets
        id: release_meta
        run: |
          ASSET_AMD64_FILE="./dist/${ASSET_BASENAME}-amd64.so"
          ASSET_AMD64_SHA256="./dist/${ASSET_BASENAME}-amd64.so.sha256"
          ASSET_ARM64_FILE="./dist/${ASSET_BASENAME}-arm64.so"
          ASSET_ARM64_SHA256="./dist/${ASSET_BASENAME}-arm64.so.sha256"

          HASH_AMD64="$(sha256sum "${ASSET_AMD64_FILE}" | awk '{print $1}')"
          HASH_ARM64="$(sha256sum "${ASSET_ARM64_FILE}" | awk '{print $1}')"
          printf '%s  %s\n' "${HASH_AMD64}" "${ASSET_BASENAME}-amd64.so" > "${ASSET_AMD64_SHA256}"
          printf '%s  %s\n' "${HASH_ARM64}" "${ASSET_BASENAME}-arm64.so" > "${ASSET_ARM64_SHA256}"

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "asset_amd64_file=${ASSET_AMD64_FILE}"
            echo "asset_amd64_sha256=${ASSET_AMD64_SHA256}"
            echo "asset_arm64_file=${ASSET_ARM64_FILE}"
            echo "asset_arm64_sha256=${ASSET_ARM64_SHA256}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish module to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ env.RELEASE_REPOSITORY }}
          target_commitish: ${{ env.IP2REGION_REF }}
          token: ${{ secrets.IP2REGION_RELEASE_TOKEN }}
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body: |
            nginx_version: `${{ env.TARGET_VERSION }}`
            image: `${{ env.IMAGE_NAME }}:${{ env.TARGET_VERSION }}`
            release_repository: `${{ env.RELEASE_REPOSITORY }}`
            source_repository: `${{ github.repository }}`
            ip2region_repo: `${{ env.IP2REGION_REPO }}`
            ip2region_ref: `${{ env.IP2REGION_REF }}`
            release_source: `${{ env.RELEASE_SOURCE }}`
            workflow_run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          files: |
            ${{ steps.release_meta.outputs.asset_amd64_file }}
            ${{ steps.release_meta.outputs.asset_amd64_sha256 }}
            ${{ steps.release_meta.outputs.asset_arm64_file }}
            ${{ steps.release_meta.outputs.asset_arm64_sha256 }}
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: ${{ env.SET_LATEST }}

  sync-to-servers:
    runs-on: ubuntu-latest
    needs:
      - detect-version
      - publish-release
    if: >-
      always() && (
        needs.publish-release.result == 'success' ||
        (
          (inputs.force_sync == true || github.event.inputs.force_sync == 'true') &&
          needs.detect-version.outputs.image_exists == 'true' &&
          needs.detect-version.outputs.publish_mode == 'skip'
        )
      )
    env:
      TZ: Asia/Shanghai
      TARGET_VERSION: ${{ needs.detect-version.outputs.target_version }}
      ASSET_BASENAME: ${{ needs.detect-version.outputs.asset_basename }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract amd64 module from image
        id: extract
        run: |
          set -euo pipefail
          mkdir -p ./dist
          IMAGE_REF="${{ env.IMAGE_NAME }}:${TARGET_VERSION}"
          MODULE_FILE="./dist/${ASSET_BASENAME}-amd64.so"

          docker pull --platform linux/amd64 "${IMAGE_REF}"
          cid="$(docker create --platform linux/amd64 "${IMAGE_REF}")"
          docker cp "${cid}:/etc/nginx/modules/ngx_http_ip2region_module.so" "${MODULE_FILE}"
          docker rm -f "${cid}" >/dev/null 2>&1 || true

          echo "module_file=${MODULE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Sync amd64 module to Ali servers
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALI_SERVER_PRIVATE_KEY }}
          SERVER_HOSTNAMES: ${{ inputs.ali_server_hostnames || github.event.inputs.ali_server_hostnames || env.DEFAULT_ALI_SERVER_HOSTNAMES }}
          MODULE_FILE: ${{ steps.extract.outputs.module_file }}
          REMOTE_DIR: /docker/nginx/ip
        run: |
          set -euo pipefail
          if [ ! -f "${MODULE_FILE}" ]; then
            echo "::error::Module file not found: ${MODULE_FILE}"
            exit 1
          fi
          MODULE_NAME="$(basename "${MODULE_FILE}")"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          IFS=',' read -ra HOSTS <<< "$SERVER_HOSTNAMES"
          for host in "${HOSTS[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue
            echo "==> Syncing ${MODULE_NAME} to ${host}:${REMOTE_DIR}/"
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 9117 "root@${host}" \
              "mkdir -p '${REMOTE_DIR}'"
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P 9117 \
              "${MODULE_FILE}" "root@${host}:${REMOTE_DIR}/${MODULE_NAME}"
          done

  skip-publish:
    runs-on: ubuntu-latest
    needs: detect-version
    if: needs.detect-version.outputs.publish_mode == 'skip'
    steps:
      - name: No build or release needed
        run: |
          echo "nginx:${{ needs.detect-version.outputs.target_version }} 的镜像和 Release 都已存在，跳过构建和发布。"
          echo "如需仅同步插件到服务器，请勾选 force_sync。"
