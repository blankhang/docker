# Redis 8 Sentinel 公共配置（与官方 sentinel.conf 字段一致）
# 文档: https://redis.io/docs/latest/operate/oss_and_stack/management/sentinel/
#
# 由启动脚本 + Secret 注入：requirepass、auth-pass、monitor、announce-ip/port
# 由本文件配置：down-after-milliseconds、failover-timeout、parallel-syncs

port 26379
bind 0.0.0.0
protected-mode no
daemonize no
dir /tmp

# 默认关闭主机名（与官方默认一致）；SENTINEL MONITOR 运行时亦要求 IPv4/IPv6 字面量
sentinel resolve-hostnames no
sentinel announce-hostnames no

sentinel down-after-milliseconds myMaster 10000
sentinel failover-timeout myMaster 180000
sentinel parallel-syncs myMaster 1
